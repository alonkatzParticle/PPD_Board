services:
  ppd-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MONDAY_API_KEY: ${MONDAY_API_KEY}
        MONDAY_API_URL: ${MONDAY_API_URL:-https://api.monday.com/v2}
    image: ppd-dashboard:latest
    container_name: ppd-dashboard
    ports:
      - "3004:3000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point to the local postgres container (runtime only)
      DATABASE_URL: postgresql://appuser:apppass@db:5432/mydb
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    container_name: ppd-db
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: mydb
    volumes:
      - pgdata_ppd_board:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "appuser", "-d", "mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata_ppd_board:
