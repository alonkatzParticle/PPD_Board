services:
  ppd-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MONDAY_API_KEY: ${MONDAY_API_KEY}
        MONDAY_API_URL: ${MONDAY_API_URL:-https://api.monday.com/v2}
    image: ppd-dashboard:latest
    container_name: ppd-dashboard
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - MONDAY_API_KEY=${MONDAY_API_KEY}
      - MONDAY_API_URL=${MONDAY_API_URL:-https://api.monday.com/v2}
      - POSTGRES_DATABASE_URL=postgresql://appuser:apppass@db:5432/mydb?sslmode=disable
      - CRON_SECRET=${CRON_SECRET}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/boards"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    container_name: ppd-db
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: mydb
    volumes:
      - pgdata_ppd_board:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "appuser", "-d", "mydb"]
      interval: 10s
      retries: 5

volumes:
  pgdata_ppd_board:
